# Fly.io app configuration.
# The deploy.yml workflow derives the real app name from your GitHub username
# ({owner}-aeo) and passes it via --app, overriding this field.
# This value is only used if you run `fly deploy` manually from a local machine.
app = "aeo-diagnostic"
primary_region = "iad"

[build]

[http_service]
  internal_port     = 8080
  force_https       = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
