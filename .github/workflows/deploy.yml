name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the workflow can commit the live-URL badge back to README.md
permissions:
  contents: write

jobs:
  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: pytest tests/ -v

  # ── 2. Deploy to Fly.io ───────────────────────────────────────────────────────
  deploy:
    name: Deploy → Fly.io
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the final README commit can push back.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive a globally-unique Fly.io app name from the GitHub owner ─────────
      # Result is always {owner}-aeo, lower-cased, max 30 chars.
      # For pallavikailas → "pallavikailas-aeo" → https://pallavikailas-aeo.fly.dev
      - name: Derive app name
        id: app
        run: |
          RAW="${{ github.repository_owner }}-aeo"
          NAME=$(echo "$RAW" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9-' '-' \
            | sed 's/-\+/-/g; s/^-//; s/-$//' \
            | cut -c1-30)
          URL="https://${NAME}.fly.dev"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "url=$URL"   >> "$GITHUB_OUTPUT"
          echo "Fly.io app : $NAME"
          echo "Live URL   : $URL"

      # ── Guard: skip remaining steps if FLY_API_TOKEN is not set ───────────────
      - name: Check for FLY_API_TOKEN secret
        id: check
        run: |
          if [ -z "$TOKEN" ]; then
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN secret not set."
            echo "  Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "  Get one at: https://fly.io/user/personal_access_tokens"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Install flyctl ─────────────────────────────────────────────────────────
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check.outputs.set == 'true'

      # ── Create the Fly.io app on first run (safe to re-run — skips if exists) ──
      - name: Create Fly.io app (first run only)
        if: steps.check.outputs.set == 'true'
        run: |
          NAME="${{ steps.app.outputs.name }}"
          if flyctl status --app "$NAME" > /dev/null 2>&1; then
            echo "App '$NAME' already exists — skipping creation."
          else
            echo "Creating app '$NAME'…"
            flyctl apps create "$NAME" --org personal
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Push GROQ_API_KEY to Fly.io secrets ────────────────────────────────────
      # --stage queues the update; secrets take effect on the next deploy.
      - name: Sync GROQ_API_KEY to Fly.io
        if: steps.check.outputs.set == 'true'
        run: |
          flyctl secrets set \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --app "${{ steps.app.outputs.name }}" \
            --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Build (remote) + deploy ────────────────────────────────────────────────
      # --remote-only: Fly.io builds the Docker image on their cloud builders.
      # No local Docker daemon required.
      - name: Deploy to Fly.io
        if: steps.check.outputs.set == 'true'
        run: |
          flyctl deploy \
            --app "${{ steps.app.outputs.name }}" \
            --remote-only \
            --wait-timeout 600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Write live-URL badge back into README.md ───────────────────────────────
      # Replaces any *.fly.dev URL in the README with the freshly-derived one,
      # then commits the change (skipped if README was already up-to-date).
      - name: Update README with live URL
        if: steps.check.outputs.set == 'true'
        run: |
          URL="${{ steps.app.outputs.url }}"

          # Replace every fly.dev URL in the file
          sed -i "s|https://[a-z0-9-]*\.fly\.dev|$URL|g" README.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "README already points at $URL — no commit needed."
          else
            git commit -m "docs: live URL → $URL [ci skip]"
            git push
          fi
