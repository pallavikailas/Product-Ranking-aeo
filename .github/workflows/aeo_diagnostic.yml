name: AEO Diagnostic

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      query:
        description: 'Product search query (e.g. "best magnesium supplement for seniors")'
        required: true
        default: "best magnesium supplement for seniors"
      target:
        description: "Target brand to track (e.g. Nature Made)"
        required: true
        default: "Nature Made"
      deep_analysis:
        description: "Run deep agent analysis?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC

jobs:
  # ── Job 1: unit tests — runs on every push, dispatch, and schedule ────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: pytest tests/ -v

  # ── Job 2: full diagnostic — only on dispatch and schedule ────────────────────
  diagnostic:
    name: Run AEO Diagnostic
    runs-on: ubuntu-latest
    needs: test                          # don't run if tests fail
    if: github.event_name != 'push'      # skip on plain push; needs GROQ_API_KEY
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve query and target
        id: inputs
        run: |
          QUERY="${{ github.event.inputs.query }}"
          TARGET="${{ github.event.inputs.target }}"
          DEEP="${{ github.event.inputs.deep_analysis }}"
          QUERY="${QUERY:-best magnesium supplement for seniors}"
          TARGET="${TARGET:-Nature Made}"
          DEEP="${DEEP:-false}"
          echo "query=$QUERY"   >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "deep=$DEEP"     >> "$GITHUB_OUTPUT"

      - name: Run AEO Diagnostic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DEEP_FLAG=""
          if [ "${{ steps.inputs.outputs.deep }}" = "true" ]; then
            DEEP_FLAG="--deep-analysis"
          fi
          python aeo_diagnostic.py \
            --query  "${{ steps.inputs.outputs.query }}" \
            --target "${{ steps.inputs.outputs.target }}" \
            --output-dir reports/ \
            $DEEP_FLAG

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeo-report-${{ github.run_number }}
          path: reports/
          retention-days: 90

      - name: Commit report to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "AEO report: ${{ steps.inputs.outputs.target }} — $DATE [ci skip]"
            git push
          fi
